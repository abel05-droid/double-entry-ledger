spring:
  application:
    name: double-entry-ledger

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ledger}
    username: ${DB_USERNAME:ledger}
    password: ${DB_PASSWORD:ledger}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Sized for a posting engine expected to take concurrent write traffic
      # (see docs/architecture.md, "Concurrency"): the default of 10 is
      # tuned for a low-traffic service, not one designed to accept many
      # simultaneous postings.
      maximum-pool-size: 20

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      group-id: double-entry-ledger
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:change-me-for-local-dev}
  expiration: PT1H

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    # Boot's own auto-configured Kafka health indicator is replaced by
    # com.abel.ledger.observability.KafkaHealthIndicator (see
    # docs/architecture.md, "Health Checks"), which reuses the app's own
    # KafkaAdmin bean rather than a separately-configured generic check.
    # Originally disabled in Phase 3 when no Kafka publishing existed at
    # all; kept disabled now for the same "avoid two indicators both
    # claiming the 'kafka' component name" reason, not because Kafka
    # health reporting is unwanted.
    kafka:
      enabled: false
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.abel.ledger: DEBUG
